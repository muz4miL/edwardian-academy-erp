server {
    server_name api.edwardiansacademy.com;
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/edwardiansacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edwardiansacademy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name erp.edwardiansacademy.com;
    root /var/www/edwardian-frontend;
    index index.html;

    location /assets/ {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        output_buffers 2 512k;
        postpone_output 0;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/edwardiansacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edwardiansacademy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name edwardiansacademy.com www.edwardiansacademy.com;
    root /var/www/edwardian-frontend;
    index index.html;

    location /assets/ {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        output_buffers 2 512k;
        postpone_output 0;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location = / { return 302 /public-home; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/edwardiansacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edwardiansacademy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.edwardiansacademy.com) { return 301 https://$host$request_uri; }
    if ($host = edwardiansacademy.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name edwardiansacademy.com www.edwardiansacademy.com;
    return 404;
}

server {
    if ($host = erp.edwardiansacademy.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name erp.edwardiansacademy.com;
    return 404;
}

server {
    if ($host = api.edwardiansacademy.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name api.edwardiansacademy.com;
    return 404;
}
